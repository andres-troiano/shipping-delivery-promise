target_column: lead_time_minutes

data:
  train_path: data/processed/train.csv
  val_path: data/processed/val.csv
  test_path: data/processed/test.csv

artifacts:
  point_model_dir: artifacts/point_model
  quantile_model_dir: artifacts/quantile_model
  policy_analysis_dir: artifacts/policy_analysis

features:
  categorical:
    - seller_category
  exclude_columns:
    - lead_time_minutes
    - prep_time_minutes
    - pickup_delay_minutes
    - delivery_duration_minutes
    - pickup_datetime
    - split
  # Numeric features are inferred automatically as:
  # all_columns - categorical - exclude_columns
  # This avoids configuration drift if new features are added
  # during dataset construction.

training:
  random_seed: 42

lightgbm_params:
  objective: regression
  n_estimators: 300
  learning_rate: 0.05
  num_leaves: 31
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8

evaluation:
  clip_min_prediction: 1.0
  enforce_monotonic_quantiles: true

quantiles:
  - 0.5
  - 0.8
  - 0.9
  - 0.95

policy_evaluation:
  validation_predictions_path: artifacts/quantile_model/interval_predictions_val.csv
  test_predictions_path: artifacts/quantile_model/interval_predictions_test.csv
  policies:
    - name: aggressive_q50_q80
      lower_quantile: 0.5
      upper_quantile: 0.8
    - name: balanced_q50_q90
      lower_quantile: 0.5
      upper_quantile: 0.9
    - name: conservative_q50_q95
      lower_quantile: 0.5
      upper_quantile: 0.95
  selection:
    max_late_delivery_rate: 0.10
    fallback: lowest_late_rate
  plot:
    annotate_points: true
    figsize: [8, 6]
